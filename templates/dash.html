<html>
    <head>
        <title>Quiz Cards</title>
        <script src="https://cdn.tailwindcss.com"></script>
            <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #e2e8f0; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .glass-panel { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(255, 255, 255, 0.1); }
        .sidebar-link.active { background: rgba(16, 185, 129, 0.1); color: #34d399; border-right: 3px solid #34d399; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        input, select, textarea { background: rgba(0,0,0,0.2) !important; color: white !important; border-color: rgba(255,255,255,0.1) !important; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #34d399 !important; }
    </style>
    </head>
    <body class="bg-gray-900 text-white w-full h-full">
        <div id="headstats" class="w-full h-[20vh] items-center justify-items-center grid grid-cols-[1fr_1fr]">
            <div id="right" class="col-start-1 h-fit w-fit col-end-1 p-5 text-center glass-panel rounded-md">
                <p class="text-3xl">Questions answered right</p>
                <p id="right-text" class="text-green-500 text-3xl">3</p>
            </div>
            <div id="wrong" class="col-start-2 h-fit w-fit col-end-2 p-5 text-center glass-panel rounded-md">
                <p class="text-3xl">Questions answered wrong</p>
                <p id="wrong-text" class="text-green-500 text-3xl">3</p>
            </div>
        </div>
        <h1 class="m-10 text-3xl">Your sets:</h1>
        <div id="cards" class="w-[95vw] grid grid-cols-4 gap-4">
            <!-- Placeholder for user sets -->
        </div>
    </body>
</html>
<script>
setTimeout(function(){
    udpatepubliccheckbox()
}, 1000)
loadcards();
fetch('/api/wrong').then(res => res.text()).then(data => document.getElementById('wrong-text').textContent = data)
fetch('/api/right').then(res => res.text()).then(data => document.getElementById('right-text').textContent = data)
    function opencards(setname) {
        window.location.href = `/viewcard?setname=${setname}`;
    }
    function deleteset(name){
        fetch(`/api/delete?name=${name}`)
        .then( respons => {
            if (!respons.ok){
                alert('UKNOWN ERROR')
            }
            else{
                window.location.href = '/dash'
            }
        })
    }
    async function loadcards(){
        await fetch('/api/cards?clear=True')
        .then(response => response.json())
        .then(data => {
            data.forEach(set => {
                createcard(set.Title, set.cards, set.description);
            });
        });
    }
    async function createcard(Title, cards, desc) {
        const fet = await fetch(`/api/getpercent?title=${encodeURIComponent(Title)}`)
        data = await fet.json()
        total = 0
        data.forEach(function(item){
            total += parseInt(item)
        })
        avg = total / data.length || 0
        avg = avg * (data.length / 10)
        bg = avg > 80 ? 'bg-green-500/20' : avg > 45 ? 'bg-yellow-500/20' : 'bg-red-500/20'
        const div = document.createElement("div");
        div.className = "glass-panel rounded-lg m-10 p-6 hover:cursor-pointer h-full w-[20vw] grid grid-rows-[auto_1fr_auto]"
        div.classList.add(bg)
        div.innerHTML = `
<div id="menu-${Title}" popover class="fixed w-40 bg-slate-800 border border-white/10 rounded-md shadow-2xl z-[100] py-2">
    <div class="block w-full text-left px-4 py-2 hover:bg-white/10 text-sm"><input class="public-input" title="${Title}" type="checkbox" id="${Title}-check"><label for="${Title}-check">Public</label></div>
    <button class="block w-full text-left px-4 py-2 hover:bg-white/10 text-sm" onclick="editcard('${Title}')">Edit</button>
    <button class="block w-full text-left px-4 py-2 hover:bg-white/10 text-sm text-red-400" onclick="deleteset('${Title}')">Delete</button>
    </div>

<div id="card-options" class="row-start-1 grid grid-cols-5 items-center">
    <svg 
onclick="
        event.stopPropagation();
        const m = document.getElementById('menu-${Title}');
        // Position it FIRST
        m.style.position = 'fixed';
        m.style.margin = '0'; // Reset default popover margins
        m.style.left = event.clientX + 'px';
        m.style.top = event.clientY + 'px';
        // Then show it
        m.showPopover();
    "
        xmlns="http://www.w3.org/2000/svg" 
        class="col-start-5 justify-self-end hover:bg-white/10 rounded-full p-1 cursor-pointer" 
        height="30px" viewBox="0 -960 960 960" width="30px" fill="#e3e3e3">
        <path d="M479.91-160q-24.24 0-41.41-17.26-17.17-17.26-17.17-41.5t17.26-41.41q17.27-17.16 41.5-17.16 24.24 0 41.41 17.26 17.17 17.26 17.17 41.5t-17.26 41.4Q504.14-160 479.91-160Zm0-261.33q-24.24 0-41.41-17.26-17.17-17.27-17.17-41.5 0-24.24 17.26-41.41 17.27-17.17 41.5-17.17 24.24 0 41.41 17.26 17.17 17.27 17.17 41.5 0 24.24-17.26 41.41-17.27 17.17-41.5 17.17Zm0-261.34q-24.24 0-41.41-17.26-17.17-17.26-17.17-41.5t17.26-41.4Q455.86-800 480.09-800q24.24 0 41.41 17.26 17.17 17.26 17.17 41.5t-17.26 41.41q-17.27 17.16-41.5 17.16Z"/>
    </svg>
</div>
        <div class="row-start-2 row-end-2" onclick="opencards('${Title}')">
            <h2 class="text-2xl mb-4">${Title}</h2>
            <p class="text-white/70 text-xl">${cards} Cards</p>
            <br>
            <p class="text-white/70">${desc}</p>
        </div class="row-start-3 row-end-3">
            <progress value="${avg}" title="Your average percent" max="100" class="w-full h-2 rounded-full overflow-hidden">
        <div>
        `
        document.getElementById("cards").appendChild(div);
    }
    function editcard(title){
        window.location.href = `/create?edit=${title}`
    }
function udpatepubliccheckbox() {
    // 1. Use querySelectorAll to get a NodeList (which supports forEach)
    const elements = document.querySelectorAll('.public-input');

    elements.forEach(ele => {
        // 2. Use 'const' so 'title' stays scoped to this specific checkbox
        const title = ele.getAttribute('title');

        // Initial sync with the server
        fetch(`/api/ispublic?name=${encodeURIComponent(title)}`)
            .then(res => res.text())
            .then(data => {
                ele.checked = (data === 'True');
            });

        // Event listener for changes
        ele.addEventListener('change', () => {
            const isPublic = ele.checked;
            fetch(`/api/setpublic?name=${encodeURIComponent(title)}&public=${isPublic}`, { method: 'POST' })
                .then(res => {
                    if (!res.ok) {
                        alert('Failed to update public status');
                        ele.checked = !isPublic; 
                    }
                })
                .catch(() => {
                    alert('An error occurred while updating public status');
                    ele.checked = !isPublic;
                });
        });
    });
}
</script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Quiz Sets</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen pb-20">
    
    <header class="p-6 md:p-10">
        <h1 class="text-4xl md:text-6xl font-bold">Your sets:</h1>
    </header>

    <main id="cards" class="grid grid-cols-1 md:grid-cols-2 gap-6 px-6 md:px-10 max-w-7xl mx-auto">
        </main>

    <script>
        // Load cards on startup
        setTimeout(function(){
            udpatepubliccheckbox()
        }, 1000)
        loadcards();

        function opencards(setname) {
            window.location.href = `/viewcard?setname=${encodeURIComponent(setname)}`;
        }

        function editcard(title) {
            window.location.href = `/create?edit=${encodeURIComponent(title)}`;
        }

        async function deleteset(name) {
            if (!confirm(`Are you sure you want to delete "${name}"?`)) return;
            
            try {
                const response = await fetch(`/api/delete?name=${encodeURIComponent(name)}`);
                if (!response.ok) throw new Error('Delete failed');
                window.location.href = '/dash';
            } catch (err) {
                alert('An error occurred while deleting the set.');
            }
        }

        async function loadcards() {
            try {
                const response = await fetch('/api/cards?clear=True');
                const data = await response.json();
                const container = document.getElementById("cards");
                container.innerHTML = ''; // Clear container

                data.forEach(set => {
                    createcard(set.Title, set.cards, set.description);
                });
            } catch (err) {
                console.error("Failed to load cards:", err);
            }
        }

        async function createcard(Title, cardCount, desc) { 
        const fet = await fetch(`/api/getpercent?title=${encodeURIComponent(Title)}`)
        data = await fet.json()
        total = 0
        data.forEach(function(item){
            total += parseInt(item)
        })
        avg = total / data.length || 0
        avg = avg * (data.length / 10)
        bg = avg > 80 ? 'bg-green-500/20' : avg > 45 ? 'bg-yellow-500/20' : 'bg-red-500/20'
            const card = document.createElement("div");
            // Modern glassmorphism style, flexible height for mobile
            card.className = "grid min-w-0 break-words grid-rows-[auto_1fr_auto]  border border-white/10 rounded-2xl overflow-hidden hover:border-white/30 transition-all";
            card.classList.add(bg)
            card.innerHTML = `
            <div id="menu-${Title}" popover class="fixed w-40 bg-slate-800 border border-white/10 rounded-md shadow-2xl z-[100] py-2">
                <div class="block w-full text-left px-4 py-2 hover:bg-white/10 text-sm"><input class="public-input mr-2" title="${Title}" type="checkbox" id="${Title}-check"><label for="${Title}-check">Public</label></div>
                <button class="block w-full text-left px-4 py-2 hover:bg-white/10 text-sm" onclick="editcard('${Title}')">Edit</button>
                <button class="block w-full text-left px-4 py-2 hover:bg-white/10 text-sm text-red-400" onclick="deleteset('${Title}')">Delete</button>
            </div>
                <div>
                        <svg 
                            onclick="
                            event.stopPropagation();
                            const m = document.getElementById('menu-${Title}');
                            // Position it FIRST
                            m.style.position = 'fixed';
                            m.style.margin = '0'; // Reset default popover margins
                            m.style.left = event.clientX + 'px';
                            m.style.top = event.clientY + 'px';
                            // Then show it
                            m.showPopover();
                            "
                            xmlns="http://www.w3.org/2000/svg" 
                            class=" ml-2 mt-2 justify-self-start hover:bg-white/10 rounded-full p-1 cursor-pointer" 
                            height="30px" viewBox="0 -960 960 960" width="30px" fill="#e3e3e3">
                            <path d="M479.91-160q-24.24 0-41.41-17.26-17.17-17.26-17.17-41.5t17.26-41.41q17.27-17.16 41.5-17.16 24.24 0 41.41 17.26 17.17 17.26 17.17 41.5t-17.26 41.4Q504.14-160 479.91-160Zm0-261.33q-24.24 0-41.41-17.26-17.17-17.27-17.17-41.5 0-24.24 17.26-41.41 17.27-17.17 41.5-17.17 24.24 0 41.41 17.26 17.17 17.27 17.17 41.5 0 24.24-17.26 41.41-17.27 17.17-41.5 17.17Zm0-261.34q-24.24 0-41.41-17.26-17.17-17.26-17.17-41.5t17.26-41.4Q455.86-800 480.09-800q24.24 0 41.41 17.26 17.17 17.26 17.17 41.5t-17.26 41.41q-17.27 17.16-41.5 17.16Z"/>
                        </svg>
                </div>
                <div class="p-6 break-words flex-grow cursor-pointer active:bg-white/5" onclick="opencards('${Title}')" role="button" aria-label="Open ${Title}">
                    <h2 class="text-2xl md:text-3xl font-bold mb-1">${Title}</h2>
                    <p class="text-blue-400 font-medium mb-3">${cardCount} Cards</p>
                    <p class="text-gray-400 text-lg line-clamp-3">${desc || 'No description provided.'}</p>
                </div>
                </div class="row-start-3 row-end-3">
                <progress value="${avg}" title="Your average percent" max="100" class="w-full h-2 rounded-full overflow-hidden">
                <div>
            `;
            document.getElementById("cards").appendChild(card);
        }
        function udpatepubliccheckbox() {
    // 1. Use querySelectorAll to get a NodeList (which supports forEach)
    const elements = document.querySelectorAll('.public-input');

    elements.forEach(ele => {
        // 2. Use 'const' so 'title' stays scoped to this specific checkbox
        const title = ele.getAttribute('title');

        // Initial sync with the server
        fetch(`/api/ispublic?name=${encodeURIComponent(title)}`)
            .then(res => res.text())
            .then(data => {
                ele.checked = (data === 'True');
            });

        // Event listener for changes
        ele.addEventListener('change', () => {
            const isPublic = ele.checked;
            fetch(`/api/setpublic?name=${encodeURIComponent(title)}&public=${isPublic}`, { method: 'POST' })
                .then(res => {
                    if (!res.ok) {
                        alert('Failed to update public status');
                        ele.checked = !isPublic; 
                    }
                })
                .catch(() => {
                    alert('An error occurred while updating public status');
                    ele.checked = !isPublic;
                });
        });
    });
}
    </script>
</body>
</html>
